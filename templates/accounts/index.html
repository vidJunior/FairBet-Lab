{% extends 'base.html' %} {% block title %}Dashboard - FairBet Lab{% endblock %}
{% block content %}
<div
  class="w-full max-w-md bg-white border border-slate-200 rounded-xl p-8 shadow-sm text-center"
>
  <div class="mb-6 flex justify-center">
    <div class="p-3 bg-slate-50 border border-slate-200 rounded-full text-slate-700">
      <i data-lucide="smile" class="w-8 h-8"></i>
    </div>
  </div>
  <h1 class="text-2xl font-bold tracking-tight text-slate-900 mb-2">
    ¡Bienvenido a FairBet Lab!
  </h1>
  <p class="text-slate-500 text-sm mb-6">
    Hola <span class="font-semibold text-slate-800">{{ user.username }}</span>. Ya estás autenticado en la plataforma.
  </p>
  <a
    href="{% url 'kyc_success_html' %}"
    class="inline-flex items-center justify-center bg-slate-900 hover:bg-slate-800 text-white font-medium px-4 py-2.5 rounded-lg text-sm transition-colors gap-1.5 w-full"
  >
    <span>Ver mi Verificación KYC</span>
    <i data-lucide="arrow-right" class="w-4 h-4"></i>
  </a>
</div>
{% endblock %}
